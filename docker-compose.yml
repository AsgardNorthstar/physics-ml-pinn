version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    command: uvicorn aagjuuk_api:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  dashboard:
    build: .
    ports:
      - "8501:8501"
    command: streamlit run streamlit_app.py --server.port=8501 --server.address=0.0.0.0
    depends_on:
      - api
    restart: unless-stopped
